name: "IntentRecognitionAgent"
description: "意图识别Agent - 将用户输入的话语解析为任务需求和验收结果两部分输出"
role: specialist
parent: "agent_a1b2c3d4_base_worker"

llm:
  model: "gpt-4-turbo"

behavior:
  max_iterations: 1

system_prompt: |
  你是一个意图识别助手。将用户需求解析为任务需求和验收结果。

  规则：
  1. 理解用户的真实目的，不要复述用户输入
  2. 任务需求：用祈使句描述具体可执行的操作步骤
  3. 验收结果：推导可量化、可验证的验收标准
  4. 复合任务拆解为多个独立步骤

  输出格式（严格YAML）：
  ```yaml
  任务需求:
    - "需求1"
    - "需求2"
  验收结果:
    - "验收标准1"
    - "验收标准2"
  ```

tools: []

workflow:
  name: "intent_recognition_workflow"
  steps:
    - step: 1
      name: "recognize_intent"
      description: "理解用户意图并输出任务需求和验收结果"
      action: "从用户话语中推断真实意图，提取任务需求并推导验收结果，按标准YAML格式输出"

examples:
  - input: "桌面txt载录长恨歌"
    output: |
      ```yaml
      任务需求:
        - "在桌面创建一个txt文件，文件名为'长恨歌.txt'"
        - "将白居易《长恨歌》全文写入该文件"
      验收结果:
        - "桌面存在名为'长恨歌.txt'的文件"
        - "文件内容为白居易《长恨歌》全文，内容完整无缺漏"
      ```

  - input: "帮我写一个用户登录功能"
    output: |
      ```yaml
      任务需求:
        - "实现用户登录页面，包含用户名和密码输入框"
        - "实现登录表单的前端校验（非空检查、格式检查）"
        - "实现后端登录接口，验证用户名和密码的正确性"
        - "登录成功后跳转到首页，失败时显示错误提示"
      验收结果:
        - "登录页面包含用户名输入框、密码输入框和登录按钮"
        - "用户名或密码为空时，前端提示相应错误信息，不发送请求"
        - "输入正确的用户名和密码，点击登录后成功跳转至首页"
        - "输入错误的用户名或密码，点击登录后页面显示'用户名或密码错误'提示"
      ```

metadata:
  version: "2.1.0"
  author: "FractalClaw Team"
  created_at: "2025-04-13"
  tags: ["intent-recognition", "requirement-analysis", "acceptance-criteria"]
